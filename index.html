<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Pantry Party</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F5F0E8;--bg2:#EDE7D9;--bg3:#E3DAC9;--card:#FDFAF5;
  --border:#DDD5C0;--text:#2C2416;--text2:#6B5E48;--text3:#A0917A;
  --accent:#8B6914;--accent-bg:#F0E4C4;
  --red:#C0392B;--red-light:#FDF0EE;
  --radius:16px;--radius-sm:10px;
  --shadow:0 2px 12px rgba(44,36,22,.07);--shadow-lg:0 8px 32px rgba(44,36,22,.13);
  --fd:'Fraunces',serif;--fb:'DM Sans',sans-serif;
}
html,body{background:var(--bg);color:var(--text);font-family:var(--fb);min-height:100vh;-webkit-font-smoothing:antialiased;}
.app{max-width:580px;margin:0 auto;padding:0 0 160px;min-height:100vh;}

/* ── Header ── */
.header{position:sticky;top:0;z-index:100;background:var(--bg);padding:18px 20px 13px;border-bottom:1.5px solid var(--border);}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.logo{display:flex;align-items:baseline;gap:8px;}
.logo-icon{font-size:22px;}
.logo-text{font-family:var(--fd);font-size:26px;font-weight:400;color:var(--text);letter-spacing:-.5px;}
.header-right{display:flex;gap:6px;align-items:center;}
.btn-ghost{border:1.5px solid var(--border);background:var(--card);color:var(--text2);padding:7px 13px;border-radius:50px;font-family:var(--fb);font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;white-space:nowrap;}
.btn-ghost:hover{background:var(--bg2);color:var(--text);}
.btn-ghost:active{transform:scale(.97);}
/* Icon-only ghost button */
.btn-icon{border:1.5px solid var(--border);background:var(--card);color:var(--text2);width:36px;height:36px;border-radius:50%;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0;}
.btn-icon:hover{background:var(--bg2);color:var(--text);}
.btn-icon:active{transform:scale(.97);}

/* ── Add bar ── */
.add-bar{display:flex;gap:8px;align-items:center;}
.add-input-wrap{flex:1;position:relative;}
.add-input{width:100%;padding:12px 16px 12px 40px;border:1.5px solid var(--border);border-radius:50px;background:var(--card);font-family:var(--fb);font-size:15px;color:var(--text);outline:none;transition:border-color .15s,box-shadow .15s;}
.add-input::placeholder{color:var(--text3);}
.add-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(139,105,20,.1);}
.add-input.already-exists{border-color:var(--red);box-shadow:0 0 0 3px rgba(192,57,43,.1);background:#FDF7F7;}
.add-input-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:16px;pointer-events:none;opacity:.45;}
.already-badge{position:absolute;right:14px;top:50%;transform:translateY(-50%);font-size:11px;font-weight:500;color:var(--red);background:var(--red-light);padding:2px 8px;border-radius:50px;pointer-events:none;white-space:nowrap;display:none;}
.already-badge.show{display:block;}
.btn-add{width:44px;height:44px;border-radius:50%;background:var(--accent);color:#fff;border:none;font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0;box-shadow:0 2px 8px rgba(139,105,20,.3);}
.btn-add:hover{background:#7a5c12;transform:scale(1.05);}
.btn-add:active{transform:scale(.95);}

/* ── Suggestions ── */
.suggestions{position:absolute;top:calc(100% + 6px);left:0;right:0;background:var(--card);border:1.5px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow-lg);z-index:200;overflow:hidden;display:none;max-height:280px;overflow-y:auto;}
.suggestions.open{display:block;}
.sug-item{display:flex;align-items:center;gap:10px;padding:11px 16px;cursor:pointer;transition:background .1s;font-size:14px;color:var(--text);}
.sug-item:hover{background:var(--bg2);}
.sug-item:not(:last-child){border-bottom:1px solid var(--bg2);}
.sug-emoji{font-size:18px;width:26px;text-align:center;}
.sug-cat{color:var(--text3);font-size:12px;margin-left:auto;padding-left:8px;}
.sug-on-list{color:#1A6B3A;font-size:11px;font-weight:500;margin-left:auto;}

/* ── Stats + controls bar ── */
.stats-bar{padding:12px 20px 0;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.stat-pill{font-size:12px;font-weight:500;color:var(--text3);background:var(--bg2);padding:4px 10px;border-radius:50px;}
.stat-pill span{color:var(--accent);font-weight:600;}
/* Push view toggle + share icon to the right */
.stats-spacer{flex:1;}
/* View toggle inline in stats bar */
.view-toggle{display:flex;border:1.5px solid var(--border);border-radius:50px;overflow:hidden;background:var(--card);}
.view-btn{padding:6px 12px;font-family:var(--fb);font-size:12px;font-weight:500;cursor:pointer;border:none;background:transparent;color:var(--text3);transition:all .15s;display:flex;align-items:center;gap:4px;white-space:nowrap;}
.view-btn.active{background:var(--accent);color:#fff;}
.view-btn:first-child{border-right:1px solid var(--border);}

/* ── List container ── */
.list-container{padding:12px 20px 0;}

/* ── Category card ── */
.cat-section{margin-bottom:12px;border-radius:var(--radius);background:var(--card);border:1.5px solid var(--border);overflow:visible;box-shadow:var(--shadow);}
.cat-section.drag-over{border-color:var(--accent);box-shadow:0 0 0 3px rgba(139,105,20,.15);}
.cat-section.cat-highlight-pulse .cat-header{animation:catPulse 1.4s ease;}
@keyframes catPulse{0%{background:var(--bg2)}25%{background:var(--accent-bg)}75%{background:var(--accent-bg)}100%{background:var(--bg2)}}

.cat-header{display:flex;align-items:center;gap:9px;padding:13px 16px;background:var(--bg2);border-bottom:1.5px solid var(--border);border-radius:var(--radius) var(--radius) 0 0;user-select:none;}
.cat-section.collapsed .cat-header{border-radius:var(--radius);border-bottom:none;}
.cat-name-wrap{flex:1;min-width:0;display:flex;align-items:center;gap:6px;cursor:pointer;}
.cat-name{font-family:var(--fd);font-size:15px;font-weight:500;color:var(--text);border:none;background:transparent;padding:0;outline:none;cursor:pointer;max-width:220px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.cat-name-input{font-family:var(--fd);font-size:15px;font-weight:500;color:var(--text);border:none;border-bottom:1.5px solid var(--accent);background:transparent;outline:none;width:160px;padding:0 0 1px;}
.cat-count{font-size:12px;font-weight:500;color:var(--text3);background:var(--bg3);padding:2px 8px;border-radius:50px;flex-shrink:0;}
.cat-chevron{font-size:12px;color:var(--text3);transition:transform .2s;flex-shrink:0;cursor:pointer;line-height:1;}
.cat-section.collapsed .cat-chevron{transform:rotate(-90deg);}
.cat-section.collapsed .cat-items{display:none;}
.cat-del-btn{width:24px;height:24px;border-radius:50%;border:none;background:transparent;color:var(--text3);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;line-height:1;transition:all .15s;opacity:0;flex-shrink:0;}
.cat-header:hover .cat-del-btn{opacity:1;}
.cat-del-btn:hover{background:var(--red-light);color:var(--red);}
.cat-items{padding:4px 0;border-radius:0 0 var(--radius) var(--radius);overflow:hidden;}

/* ── Done divider ── */
.cat-done-divider{display:flex;align-items:center;gap:10px;padding:8px 16px 6px;cursor:pointer;border-top:1px dashed var(--border);margin-top:2px;user-select:none;}
.cat-done-label{font-size:12px;font-weight:500;color:var(--text3);flex:1;}
.cat-done-chevron{font-size:11px;color:var(--text3);transition:transform .25s;flex-shrink:0;line-height:1;}
/* collapsed state: chevron rotates, items hidden */
.done-div-collapsed .cat-done-chevron{transform:rotate(-90deg);}
.done-div-collapsed .cat-done-items{display:none;}

/* ── Add category button (bottom of list) ── */
.add-cat-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:13px;border:1.5px dashed var(--border);border-radius:var(--radius);background:transparent;color:var(--text3);font-family:var(--fb);font-size:13px;font-weight:500;cursor:pointer;transition:all .2s;margin-bottom:12px;}
.add-cat-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-bg);}

/* ── Flat view ── */
.flat-section{margin-bottom:12px;border-radius:var(--radius);background:var(--card);border:1.5px solid var(--border);box-shadow:var(--shadow);overflow:hidden;}
.flat-section-header{padding:10px 16px;background:var(--bg2);border-bottom:1.5px solid var(--border);display:flex;align-items:center;gap:8px;}
.flat-section-title{font-family:var(--fd);font-size:14px;font-weight:500;color:var(--text2);flex:1;}
.flat-section-count{font-size:11px;font-weight:500;color:var(--text3);background:var(--bg3);padding:2px 7px;border-radius:50px;}

/* ── List item ── */
.list-item{display:flex;align-items:center;padding:10px 14px;position:relative;transition:background .15s;touch-action:pan-y;overflow:hidden;cursor:grab;}
.list-item:not(:last-child){border-bottom:1px solid var(--bg2);}
.list-item:hover{background:rgba(0,0,0,.018);}
.list-item.highlight-pulse{animation:pulse 1.3s ease;}
@keyframes pulse{0%{background:transparent}20%{background:#F0E4C4}80%{background:#F0E4C4}100%{background:transparent}}
.list-item.dragging{opacity:.4;cursor:grabbing;}

/* Swipe */
.item-del-bg{position:absolute;right:0;top:0;bottom:0;background:var(--red-light);display:flex;align-items:center;justify-content:flex-end;padding-right:18px;color:var(--red);font-size:13px;font-weight:500;gap:5px;width:80px;opacity:0;transition:opacity .1s;pointer-events:none;}
.item-del-bg.visible{opacity:1;}
.item-inner{display:flex;align-items:center;gap:10px;flex:1;transition:transform .15s ease;background:inherit;z-index:1;position:relative;width:100%;}

/* Check circle */
.item-check{width:22px;height:22px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:all .15s;background:transparent;}
.item-check:hover{border-color:var(--accent);background:var(--accent-bg);}
.list-item.checked .item-check{background:var(--accent);border-color:var(--accent);}
.check-mark{color:white;font-size:11px;opacity:0;transition:opacity .1s;}
.list-item.checked .check-mark{opacity:1;}

/* Emoji — tappable for override */
.item-emoji{font-size:19px;width:28px;text-align:center;flex-shrink:0;cursor:pointer;border-radius:6px;transition:background .12s;position:relative;}
.item-emoji:hover{background:var(--bg2);}
.item-emoji-input{position:absolute;opacity:0;width:1px;height:1px;pointer-events:none;}

/* Name — flex:1 pushes everything after it right */
.item-name{font-size:14px;color:var(--text);font-weight:400;transition:color .15s;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.list-item.checked .item-name{text-decoration:line-through;color:var(--text3);}

/* Category pill (flat view) — flush right, before qty */
.item-cat-pill{font-size:11px;font-weight:500;color:var(--text2);background:var(--bg2);border:1px solid var(--border);padding:2px 9px;border-radius:50px;white-space:nowrap;flex-shrink:0;}
.list-item.checked .item-cat-pill{opacity:.5;}

/* Qty — always flush right */
.qty-control{display:flex;align-items:center;border:1.5px solid var(--border);border-radius:50px;overflow:hidden;flex-shrink:0;background:var(--bg);margin-left:auto;}
.qty-btn{width:26px;height:26px;border:none;background:transparent;color:var(--text2);font-size:15px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .12s;line-height:1;flex-shrink:0;}
.qty-btn:hover{background:var(--bg3);}
.qty-btn:active{background:var(--bg2);}
.qty-btn.qty-minus{border-right:1px solid var(--border);}
.qty-btn.qty-plus{border-left:1px solid var(--border);}
.qty-num{font-size:13px;font-weight:500;color:var(--text);min-width:22px;text-align:center;font-family:var(--fb);}
.item-del-btn{width:26px;height:26px;border-radius:50%;border:none;background:transparent;color:var(--text3);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:17px;line-height:1;transition:all .15s;opacity:0;flex-shrink:0;}
.list-item:hover .item-del-btn{opacity:1;}
.item-del-btn:hover{background:var(--red-light);color:var(--red);}

/* Drag ghost */
.drag-ghost{position:fixed;pointer-events:none;z-index:9999;opacity:.92;background:var(--card);border:1.5px solid var(--accent);border-radius:var(--radius-sm);padding:9px 14px;box-shadow:var(--shadow-lg);display:flex;align-items:center;gap:10px;font-family:var(--fb);font-size:14px;color:var(--text);}

/* Empty */
.empty-state{text-align:center;padding:60px 20px;color:var(--text3);}
.empty-icon{font-size:48px;margin-bottom:16px;}
.empty-state p{font-family:var(--fd);font-size:18px;font-weight:300;margin-bottom:8px;color:var(--text2);}

/* ── Modals ── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(44,36,22,.45);z-index:400;align-items:flex-end;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{background:var(--card);border-radius:var(--radius) var(--radius) 0 0;width:100%;max-width:580px;padding:20px;max-height:80vh;overflow-y:auto;animation:slideUp .22s ease;}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-title{font-family:var(--fd);font-size:18px;font-weight:400;color:var(--text);margin-bottom:16px;padding-bottom:14px;border-bottom:1.5px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.modal-close{background:none;border:none;font-size:20px;color:var(--text3);cursor:pointer;padding:0 2px;}
.cat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.cat-opt{display:flex;align-items:center;gap:10px;padding:11px 13px;border-radius:var(--radius-sm);border:1.5px solid var(--border);background:var(--bg);cursor:pointer;transition:all .15s;font-size:14px;color:var(--text);}
.cat-opt:hover{background:var(--accent-bg);border-color:var(--accent);}
.cat-opt.selected{background:var(--accent-bg);border-color:var(--accent);font-weight:500;}
/* Add category form */
.add-cat-form{display:flex;flex-direction:column;gap:14px;}
.field-label{font-size:13px;font-weight:500;color:var(--text2);margin-bottom:5px;}
.field-input{width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:var(--radius-sm);background:var(--bg);font-family:var(--fb);font-size:15px;color:var(--text);outline:none;transition:border-color .15s;}
.field-input:focus{border-color:var(--accent);}
.btn-primary{background:var(--accent);color:#fff;border:none;padding:12px 22px;border-radius:50px;font-family:var(--fb);font-size:14px;font-weight:500;cursor:pointer;transition:all .15s;align-self:flex-start;}
.btn-primary:hover{background:#7a5c12;}

/* Share modal */
.share-section{margin-bottom:20px;}
.share-section:last-child{margin-bottom:0;}
.share-label{font-size:12px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px;}
.share-row{display:flex;gap:8px;align-items:stretch;}
.share-url-box{flex:1;padding:10px 14px;background:var(--bg2);border:1.5px solid var(--border);border-radius:var(--radius-sm);font-family:var(--fb);font-size:13px;color:var(--text2);word-break:break-all;line-height:1.4;max-height:68px;overflow:hidden;}
.share-copy-btn{flex-shrink:0;padding:10px 16px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius-sm);font-family:var(--fb);font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;white-space:nowrap;}
.share-copy-btn:hover{background:#7a5c12;}
.share-copy-btn.copied{background:#1A6B3A;}
.share-text-box{width:100%;padding:12px 14px;background:var(--bg2);border:1.5px solid var(--border);border-radius:var(--radius-sm);font-family:var(--fb);font-size:12px;color:var(--text2);line-height:1.6;max-height:180px;overflow-y:auto;white-space:pre-wrap;word-break:break-word;}
.share-divider{border:none;border-top:1px solid var(--border);margin:16px 0;}

/* Toast */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--text);color:#fff;padding:10px 20px;border-radius:50px;font-size:14px;z-index:600;opacity:0;transition:all .25s ease;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

@media(min-width:560px){.modal{border-radius:var(--radius);margin-bottom:40px;}}
@media(max-width:400px){.qty-num{min-width:18px;}.item-name{font-size:13px;}.view-btn{padding:5px 9px;font-size:11px;}}
</style>
</head>
<body>
<div class="app">

  <!-- Header: logo left, Reset right only -->
  <div class="header">
    <div class="header-top">
      <div class="logo"><span class="logo-icon">🛒</span><span class="logo-text">Pantry Party</span></div>
      <div class="header-right">
        <button class="btn-ghost" onclick="uncheckAll()">↺ Reset</button>
      </div>
    </div>
    <div class="add-bar">
      <div class="add-input-wrap">
        <span class="add-input-icon">🔍</span>
        <input class="add-input" id="addInput" type="text" placeholder="Add item — try 'bananas', 'chicken'…" autocomplete="off" autocorrect="off" spellcheck="false">
        <span class="already-badge" id="alreadyBadge">Already on list</span>
        <div class="suggestions" id="suggestions"></div>
      </div>
      <button class="btn-add" onclick="addFromInput()">+</button>
    </div>
  </div>

  <!-- Stats bar: pills left, view toggle + share icon right -->
  <div class="stats-bar" id="statsBar"></div>

  <div class="list-container" id="listContainer"></div>
</div>

<!-- Category picker -->
<div class="modal-overlay" id="catPickerOverlay" onclick="closeCatPicker(event)">
  <div class="modal">
    <div class="modal-title">Move To Category <button class="modal-close" onclick="closeCatPicker()">×</button></div>
    <div class="cat-grid" id="catPickerGrid"></div>
  </div>
</div>

<!-- Add category modal -->
<div class="modal-overlay" id="addCatOverlay" onclick="closeAddCatModal(event)">
  <div class="modal">
    <div class="modal-title">New Category <button class="modal-close" onclick="closeAddCatModal()">×</button></div>
    <div class="add-cat-form">
      <div>
        <div class="field-label">Category Name</div>
        <input class="field-input" id="newCatName" placeholder="e.g. Indian Grocery, Bakery…" maxlength="32">
      </div>
      <button class="btn-primary" onclick="confirmAddCategory()">Add Category</button>
    </div>
  </div>
</div>

<!-- Share modal -->
<div class="modal-overlay" id="shareOverlay" onclick="closeShareModal(event)">
  <div class="modal">
    <div class="modal-title">Share List <button class="modal-close" onclick="closeShareModal()">×</button></div>
    <div class="share-section">
      <div class="share-label">Shareable Link</div>
      <p style="font-size:13px;color:var(--text3);margin-bottom:10px;line-height:1.5;">Anyone with this link can open a snapshot of your list in any browser — no install needed.</p>
      <div class="share-row">
        <div class="share-url-box" id="shareUrlBox"></div>
        <button class="share-copy-btn" id="shareLinkBtn" onclick="copyShareLink()">Copy Link</button>
      </div>
    </div>
    <hr class="share-divider">
    <div class="share-section">
      <div class="share-label">Copy as Text</div>
      <p style="font-size:13px;color:var(--text3);margin-bottom:10px;line-height:1.5;">Paste into email, WhatsApp, or any message app.</p>
      <div class="share-text-box" id="shareTextBox"></div>
      <div class="share-row" style="margin-top:10px;">
        <button class="share-copy-btn" id="shareTextBtn" onclick="copyShareText()" style="width:100%;">Copy Text</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- Hidden file input for emoji via keyboard (mobile) -->
<input type="text" id="emojiInputProxy" style="position:fixed;opacity:0;width:1px;height:1px;pointer-events:none;" inputmode="none">

<script>
// ── Utilities ────────────────────────────────────────────────────────────
function toTitleCase(str) {
  const minors = new Set(['a','an','the','and','but','or','for','nor','on','at','to','by','in','of','up','as']);
  return str.trim().split(' ').map((w,i)=>{
    if(!w) return w;
    const l=w.toLowerCase();
    return (i!==0&&minors.has(l))?l:w.charAt(0).toUpperCase()+w.slice(1).toLowerCase();
  }).join(' ');
}

// ── Default categories ────────────────────────────────────────────────────
const DEFAULT_CATEGORIES = [
  {id:'fruits',    name:'Fruits',             emoji:'🍎'},
  {id:'vegetables',name:'Vegetables',          emoji:'🥦'},
  {id:'proteins',  name:'Proteins',            emoji:'🍗'},
  {id:'dairy',     name:'Dairy & Eggs',        emoji:'🥛'},
  {id:'breads',    name:'Breads & Carbs',      emoji:'🍞'},
  {id:'frozen',    name:'Frozen',              emoji:'🧊'},

const itemByName={};
ITEM_DB.forEach(i=>{itemByName[i.name.toLowerCase()]=i;});
function lookupItem(raw){const l=raw.toLowerCase().trim();if(itemByName[l])return itemByName[l];for(const[k,v]of Object.entries(itemByName)){if(k.includes(l)||l.includes(k))return v;}return null;}

// ── State ─────────────────────────────────────────────────────────────────
let items=[];
let categories=JSON.parse(JSON.stringify(DEFAULT_CATEGORIES));
let collapsedCats=new Set();
let doneDividerCollapsed={};
let currentView='grouped';
let pendingCatItem=null;

function getCat(id){return categories.find(c=>c.id===id);}

function loadState(){
  try{
    const hash=window.location.hash;
    if(hash.startsWith('#share=')){
      try{
        const decoded=JSON.parse(decodeURIComponent(atob(hash.slice(7))));
        if(decoded.items){items=decoded.items;if(decoded.categories)categories=decoded.categories;saveState();window.location.hash='';showToast('Shared list loaded! 🛒');return;}
      }catch(e){}
    }
    const s=localStorage.getItem('cartly_v5');
    if(!s)return;
    const p=JSON.parse(s);
    items=p.items||[];
    categories=p.categories||JSON.parse(JSON.stringify(DEFAULT_CATEGORIES));
    collapsedCats=new Set(p.collapsedCats||[]);
    doneDividerCollapsed=p.doneDividerCollapsed||{};
    currentView=p.currentView||'grouped';
  }catch(e){}
}
function saveState(){
  localStorage.setItem('cartly_v5',JSON.stringify({items,categories,collapsedCats:[...collapsedCats],doneDividerCollapsed,currentView}));
}

// ── Item actions ──────────────────────────────────────────────────────────
function addItem(name,catOverride){
  const display=toTitleCase(name.trim());
  if(!display)return false;
  const existing=items.find(i=>i.name.toLowerCase()===display.toLowerCase());
  if(existing){highlightItem(existing.id);showToast(`"${display}" is already on your list`);return false;}
  const match=lookupItem(display);
  const emoji=match?match.emoji:(getCat(catOverride||'misc')?.emoji||'🛒');
  const cat=catOverride||(match?match.cat:'misc');
  items.push({id:Date.now()+Math.random(),name:display,emoji,cat,checked:false,qty:1});
  saveState();render();showToast(`Added ${emoji} ${display}`);
  return true;
}
function deleteItem(id){items=items.filter(i=>i.id!==id);saveState();render();}
function toggleItem(id){const it=items.find(i=>i.id===id);if(it)it.checked=!it.checked;saveState();render();}
function changeQty(id,delta){const it=items.find(i=>i.id===id);if(!it)return;it.qty=Math.max(1,(it.qty||1)+delta);saveState();const el=document.querySelector(`.qty-num[data-id="${id}"]`);if(el)el.textContent=it.qty;}
function uncheckAll(){items.forEach(i=>i.checked=false);saveState();render();showToast('List reset — ready for your next trip 🛒');}
function moveItemToCat(itemId,catId){const it=items.find(i=>i.id===itemId);if(it){it.cat=catId;saveState();render();showToast(`Moved to ${getCat(catId)?.name}`);}}

function highlightItem(id){
  const it=items.find(i=>i.id===id);if(!it)return;
  if(collapsedCats.has(it.cat))collapsedCats.delete(it.cat);
  if(it.checked)doneDividerCollapsed[it.cat]=false;
  saveState();render();
  requestAnimationFrame(()=>{
    const el=document.querySelector(`[data-item-id="${id}"]`);
    if(el){el.scrollIntoView({behavior:'smooth',block:'center'});el.classList.add('highlight-pulse');setTimeout(()=>el.classList.remove('highlight-pulse'),1400);}
  });
}

// ── Emoji change ──────────────────────────────────────────────────────────
let emojiTargetId = null;

function openEmojiPicker(id) {
  emojiTargetId = id;
  // Use a hidden input with emoji keyboard to capture emoji input
  // Works natively on iOS (emoji keyboard) and desktop (system emoji picker or paste)
  const proxy = document.getElementById('emojiInputProxy');
  proxy.value = '';
  proxy.style.cssText = 'position:fixed;bottom:50%;left:50%;opacity:0;width:40px;height:40px;font-size:24px;border:none;background:transparent;z-index:1000;';
  proxy.focus();
  // Show a brief toast hint
  showToast('Type or paste an emoji for this item');
}

document.getElementById('emojiInputProxy').addEventListener('input', function(e) {
  const val = this.value;
  if (!val || !emojiTargetId) return;
  // Extract first emoji character(s) — grab the first grapheme cluster that is emoji-like
  const emojiMatch = [...val].find(ch => ch.codePointAt(0) > 127);
  if (emojiMatch) {
    const it = items.find(i => i.id === emojiTargetId);
    if (it) {
      it.emoji = emojiMatch;
      saveState();
      // Update just the emoji span without full re-render for smoothness
      const span = document.querySelector(`.item-emoji[data-id="${emojiTargetId}"]`);
      if (span) span.textContent = emojiMatch;
    }
  }
  this.value = '';
  this.style.cssText = 'position:fixed;opacity:0;width:1px;height:1px;pointer-events:none;';
  emojiTargetId = null;
});

document.getElementById('emojiInputProxy').addEventListener('blur', function() {
  this.style.cssText = 'position:fixed;opacity:0;width:1px;height:1px;pointer-events:none;';
});

// ── Category actions ──────────────────────────────────────────────────────
function addCategory(name){const id='cat_'+Date.now();categories.push({id,name:toTitleCase(name),emoji:'📋'});saveState();render();return id;}
function deleteCategory(id){items.forEach(i=>{if(i.cat===id)i.cat='misc';});categories=categories.filter(c=>c.id!==id);saveState();render();showToast('Category removed — items moved to Miscellaneous');}
function toggleCat(id){if(collapsedCats.has(id))collapsedCats.delete(id);else collapsedCats.add(id);saveState();render();}
function toggleDoneDivider(catId){doneDividerCollapsed[catId]=!doneDividerCollapsed[catId];saveState();render();}
function setView(v){currentView=v;saveState();renderStatsBar();render();}

// ── Render stats bar ──────────────────────────────────────────────────────
function renderStatsBar(){
  const active=items.filter(i=>!i.checked);
  const done=items.filter(i=>i.checked);
  document.getElementById('statsBar').innerHTML = `
    ${items.length ? `<div class="stat-pill"><span>${active.length}</span> remaining</div>` : ''}
    ${done.length ? `<div class="stat-pill"><span>${done.length}</span> done</div>` : ''}
    <div class="stats-spacer"></div>
    <div class="view-toggle">
      <button class="view-btn${currentView==='grouped'?' active':''}" id="viewGrouped" onclick="setView('grouped')">⊞ Grouped</button>
      <button class="view-btn${currentView==='flat'?' active':''}" id="viewFlat" onclick="setView('flat')">≡ List</button>
    </div>
    <button class="btn-icon" onclick="openShareModal()" title="Share list">⬆</button>
  `;
}

// ── Main render ───────────────────────────────────────────────────────────
function render(){
  renderStatsBar();
  const container=document.getElementById('listContainer');
  const hasItems=items.length>0;
  const hasCustomCats=categories.some(c=>!DEFAULT_CATEGORIES.find(d=>d.id===c.id));

  if(!hasItems&&!hasCustomCats){
    container.innerHTML=`<div class="empty-state"><div class="empty-icon">🛒</div><p>Your list is empty</p><small>Start typing above to add your first item</small></div>`;
    return;
  }
  currentView==='flat'?renderFlat(container):renderGrouped(container);
  attachSwipe();attachDrag();
}

// ── Grouped ───────────────────────────────────────────────────────────────
function renderGrouped(container){
  const catMap={};
  items.forEach(it=>{(catMap[it.cat]=catMap[it.cat]||[]).push(it);});
  let html='';
  categories.forEach(cat=>{
    const catItems=catMap[cat.id]||[];
    const isDefault=DEFAULT_CATEGORIES.some(d=>d.id===cat.id);
    if(catItems.length===0&&isDefault)return;
    const activeItems=catItems.filter(i=>!i.checked).sort((a,b)=>a.name.localeCompare(b.name));
    const doneItems=catItems.filter(i=>i.checked).sort((a,b)=>a.name.localeCompare(b.name));
    const collapsed=collapsedCats.has(cat.id);
    const doneCol=doneDividerCollapsed[cat.id];
    const isCustom=!DEFAULT_CATEGORIES.some(d=>d.id===cat.id);
    html+=`<div class="cat-section${collapsed?' collapsed':''}" data-cat="${cat.id}"
      ondragover="onCatDragOver(event,'${cat.id}')"
      ondragleave="onCatDragLeave(event,'${cat.id}')"
      ondrop="onCatDrop(event,'${cat.id}')">
      <div class="cat-header">
        <div class="cat-name-wrap" onclick="toggleCat('${cat.id}')">
          <span class="cat-name" onclick="event.stopPropagation();startRename('${cat.id}',this)">${cat.name}</span>
        </div>
        <span class="cat-count">${catItems.length}</span>
        ${isCustom?`<button class="cat-del-btn" onclick="event.stopPropagation();deleteCategory('${cat.id}')">×</button>`:''}
        <span class="cat-chevron" onclick="toggleCat('${cat.id}')">▾</span>
      </div>
      <div class="cat-items">
        ${catItems.length===0?`<div style="padding:14px 16px;font-size:13px;color:var(--text3);text-align:center;">Empty — drag items here or add above</div>`:''}
        ${activeItems.map(it=>renderItemRow(it,false)).join('')}
        ${doneItems.length?`
          <div class="cat-done-divider${doneCol?' done-div-collapsed':''}" onclick="toggleDoneDivider('${cat.id}')">
            <span class="cat-done-label">✓ Done (${doneItems.length})</span>
            <span class="cat-done-chevron">▾</span>
          </div>
          <div class="cat-done-items">
            ${doneItems.map(it=>renderItemRow(it,false)).join('')}
          </div>`:''}
      </div>
    </div>`;
  });
  // + Add Category button at bottom
  html+=`<button class="add-cat-btn" onclick="openAddCatModal()">＋ Add Category</button>`;
  container.innerHTML=html||`<div class="empty-state"><div class="empty-icon">🛒</div><p>Your list is empty</p><small>Start typing above to add your first item</small></div>`;
}

// ── Flat ──────────────────────────────────────────────────────────────────
function renderFlat(container){
  const active=items.filter(i=>!i.checked).sort((a,b)=>a.name.localeCompare(b.name));
  const done=items.filter(i=>i.checked).sort((a,b)=>a.name.localeCompare(b.name));
  let html='';
  if(active.length){
    html+=`<div class="flat-section">
      <div class="flat-section-header"><span class="flat-section-title">All Items</span><span class="flat-section-count">${active.length}</span></div>
      ${active.map(it=>renderItemRow(it,true)).join('')}
    </div>`;
  }
  if(done.length){
    html+=`<div class="flat-section">
      <div class="flat-section-header"><span class="flat-section-title">✓ Done</span><span class="flat-section-count">${done.length}</span></div>
      ${done.map(it=>renderItemRow(it,true)).join('')}
    </div>`;
  }
  container.innerHTML=html||`<div class="empty-state"><div class="empty-icon">🛒</div><p>Your list is empty</p><small>Start typing above to add your first item</small></div>`;
}

// ── Item row ──────────────────────────────────────────────────────────────
function renderItemRow(it,showCatPill){
  const qty=it.qty||1;
  const catName=showCatPill?(getCat(it.cat)?.name||'Misc'):'';
  return `<div class="list-item${it.checked?' checked':''}" data-item-id="${it.id}" data-id="${it.id}" draggable="true">
    <div class="item-del-bg" id="delbg_${it.id}">🗑 Delete</div>
    <div class="item-inner" id="inner_${it.id}">
      <div class="item-check" onclick="toggleItem(${it.id})"><span class="check-mark">✓</span></div>
      <span class="item-emoji" data-id="${it.id}" onclick="openEmojiPicker(${it.id})" title="Tap to change emoji">${it.emoji}</span>
      <span class="item-name">${it.name}</span>
      ${showCatPill?`<span class="item-cat-pill">${catName}</span>`:''}
      <div class="qty-control" onclick="event.stopPropagation()">
        <button class="qty-btn qty-minus" onclick="changeQty(${it.id},-1)">−</button>
        <span class="qty-num" data-id="${it.id}">${qty}</span>
        <button class="qty-btn qty-plus" onclick="changeQty(${it.id},1)">+</button>
      </div>
      <button class="item-del-btn" onclick="deleteItem(${it.id})">×</button>
    </div>
  </div>`;
}

// ── Inline rename ─────────────────────────────────────────────────────────
function startRename(catId,el){const cat=getCat(catId);if(!cat)return;const inp=document.createElement('input');inp.className='cat-name-input';inp.value=cat.name;inp.onclick=e=>e.stopPropagation();inp.onkeydown=e=>{if(e.key==='Enter')finishRename(catId,inp.value);if(e.key==='Escape')render();e.stopPropagation();};inp.onblur=()=>finishRename(catId,inp.value);el.parentNode.replaceChild(inp,el);inp.focus();inp.select();}
function finishRename(catId,val){if(val.trim()){const c=getCat(catId);if(c){c.name=toTitleCase(val.trim());saveState();}}render();}

// ── Drag & drop ───────────────────────────────────────────────────────────
let dragId=null,dragGhost=null;
function attachDrag(){
  document.querySelectorAll('.list-item[draggable]').forEach(el=>{
    el.addEventListener('dragstart',e=>{
      dragId=Number(el.dataset.id);el.classList.add('dragging');
      const it=items.find(i=>i.id===dragId);
      dragGhost=document.createElement('div');dragGhost.className='drag-ghost';
      dragGhost.innerHTML=`<span>${it?.emoji||'🛒'}</span><span>${it?.name||''}</span>`;
      dragGhost.style.cssText='top:-200px;left:-200px;';document.body.appendChild(dragGhost);
      e.dataTransfer.setDragImage(dragGhost,0,0);e.dataTransfer.effectAllowed='move';
    });
    el.addEventListener('dragend',()=>{
      el.classList.remove('dragging');
      if(dragGhost){dragGhost.remove();dragGhost=null;}
      document.querySelectorAll('.cat-section').forEach(s=>s.classList.remove('drag-over'));
    });
  });
}
function onCatDragOver(e,catId){e.preventDefault();e.dataTransfer.dropEffect='move';document.querySelectorAll('.cat-section').forEach(s=>s.classList.remove('drag-over'));e.currentTarget.classList.add('drag-over');}
function onCatDragLeave(e){if(!e.currentTarget.contains(e.relatedTarget))e.currentTarget.classList.remove('drag-over');}
function onCatDrop(e,catId){e.preventDefault();e.currentTarget.classList.remove('drag-over');if(dragId){const it=items.find(i=>i.id===dragId);if(it&&it.cat!==catId)moveItemToCat(dragId,catId);dragId=null;}}

// ── Swipe to delete ───────────────────────────────────────────────────────
function attachSwipe(){
  if(!window.matchMedia('(pointer:coarse)').matches)return;
  document.querySelectorAll('.list-item').forEach(el=>{
    let sx=0,cx=0,sw=false;const id=Number(el.dataset.id);
    const inner=document.getElementById('inner_'+id);const delbg=document.getElementById('delbg_'+id);
    if(!inner||!delbg)return;
    el.addEventListener('touchstart',e=>{sx=e.touches[0].clientX;sw=true;},{passive:true});
    el.addEventListener('touchmove',e=>{if(!sw)return;cx=e.touches[0].clientX-sx;if(cx<0){inner.style.transform=`translateX(${Math.max(cx,-80)}px)`;delbg.classList.toggle('visible',cx<-30);}},{passive:true});
    el.addEventListener('touchend',()=>{if(cx<-60)deleteItem(id);else{inner.style.transform='';delbg.classList.remove('visible');}sw=false;cx=0;});
  });
}

// ── Input & suggestions ───────────────────────────────────────────────────
const inputEl=document.getElementById('addInput');
const sugsEl=document.getElementById('suggestions');
const alreadyBadge=document.getElementById('alreadyBadge');
function addFromInput(){const val=inputEl.value.trim();if(!val)return;if(addItem(val)){inputEl.value='';hideSugs();updateInputState('');}}
inputEl.addEventListener('keydown',e=>{if(e.key==='Enter')addFromInput();if(e.key==='Escape'){hideSugs();inputEl.blur();}});
inputEl.addEventListener('input',()=>{const q=inputEl.value.trim();updateInputState(q);renderSugs(q);});
function updateInputState(q){if(!q){inputEl.classList.remove('already-exists');alreadyBadge.classList.remove('show');return;}const exists=items.some(i=>i.name.toLowerCase()===toTitleCase(q).toLowerCase());inputEl.classList.toggle('already-exists',exists);alreadyBadge.classList.toggle('show',exists);}
function renderSugs(q){if(!q){hideSugs();return;}const lower=q.toLowerCase();const onList=new Set(items.map(i=>i.name.toLowerCase()));const catNames={};categories.forEach(c=>catNames[c.id]=c.name);const matches=ITEM_DB.filter(i=>i.name.toLowerCase().includes(lower)).slice(0,8);if(!matches.length){hideSugs();return;}sugsEl.innerHTML=matches.map(m=>{const onL=onList.has(m.name.toLowerCase());return`<div class="sug-item" onclick="selectSug('${m.name}')"><span class="sug-emoji">${m.emoji}</span><span>${m.name}</span>${onL?`<span class="sug-on-list">✓ On list</span>`:`<span class="sug-cat">${catNames[m.cat]||''}</span>`}</div>`;}).join('');sugsEl.classList.add('open');}
function selectSug(name){if(addItem(name)){inputEl.value='';hideSugs();updateInputState('');}else{hideSugs();inputEl.value='';updateInputState('');}}
function hideSugs(){sugsEl.classList.remove('open');sugsEl.innerHTML='';}
document.addEventListener('click',e=>{if(!e.target.closest('.add-input-wrap'))hideSugs();});

// ── Category picker ───────────────────────────────────────────────────────
function openCatPicker(itemId){pendingCatItem=itemId;const it=items.find(i=>i.id===itemId);document.getElementById('catPickerGrid').innerHTML=categories.map(c=>`<div class="cat-opt${it?.cat===c.id?' selected':''}" onclick="pickCat('${c.id}')"><span>${c.emoji}</span><span>${c.name}</span></div>`).join('');document.getElementById('catPickerOverlay').classList.add('open');}
function pickCat(catId){if(pendingCatItem)moveItemToCat(pendingCatItem,catId);closeCatPicker();}
function closeCatPicker(e){if(!e||e.target===document.getElementById('catPickerOverlay')){document.getElementById('catPickerOverlay').classList.remove('open');pendingCatItem=null;}}

// ── Add category modal ────────────────────────────────────────────────────
function openAddCatModal(){document.getElementById('newCatName').value='';document.getElementById('addCatOverlay').classList.add('open');setTimeout(()=>document.getElementById('newCatName').focus(),150);}
function confirmAddCategory(){
  const name=document.getElementById('newCatName').value.trim();
  if(!name){document.getElementById('newCatName').focus();return;}
  const tc=toTitleCase(name);
  const existing=categories.find(c=>c.name.toLowerCase()===tc.toLowerCase());
  if(existing){
    closeAddCatModal();showToast(`"${tc}" already exists`);
    requestAnimationFrame(()=>{const el=document.querySelector(`[data-cat="${existing.id}"]`);if(el){el.scrollIntoView({behavior:'smooth',block:'center'});el.classList.add('cat-highlight-pulse');setTimeout(()=>el.classList.remove('cat-highlight-pulse'),1600);}});
    return;
  }
  addCategory(tc);closeAddCatModal();showToast(`"${tc}" category added`);
}
function closeAddCatModal(e){if(!e||e.target===document.getElementById('addCatOverlay'))document.getElementById('addCatOverlay').classList.remove('open');}
document.getElementById('newCatName').addEventListener('keydown',e=>{if(e.key==='Enter')confirmAddCategory();});

// ── Share ─────────────────────────────────────────────────────────────────
function buildShareUrl(){const payload={items,categories};const encoded=btoa(encodeURIComponent(JSON.stringify(payload)));return`${window.location.href.split('#')[0]}#share=${encoded}`;}
function buildShareText(){
  const active=items.filter(i=>!i.checked).sort((a,b)=>a.name.localeCompare(b.name));
  const done=items.filter(i=>i.checked).sort((a,b)=>a.name.localeCompare(b.name));
  let txt='🛒 Cartly Grocery List\n'+'─'.repeat(28)+'\n\n';
  const catMap={};active.forEach(it=>{(catMap[it.cat]=catMap[it.cat]||[]).push(it);});
  categories.forEach(cat=>{const its=catMap[cat.id];if(!its||!its.length)return;txt+=`${cat.name.toUpperCase()}\n`;its.forEach(it=>{txt+=`  ${it.emoji} ${it.name}${it.qty>1?` ×${it.qty}`:''}\n`;});txt+='\n';});
  if(done.length){txt+='DONE ✓\n';done.forEach(it=>{txt+=`  ✓ ${it.name}\n`;});}
  return txt.trim();
}
function openShareModal(){
  const url=buildShareUrl();
  document.getElementById('shareUrlBox').textContent=url;
  document.getElementById('shareTextBox').textContent=buildShareText();
  document.getElementById('shareLinkBtn').textContent='Copy Link';document.getElementById('shareLinkBtn').classList.remove('copied');
  document.getElementById('shareTextBtn').textContent='Copy Text';document.getElementById('shareTextBtn').classList.remove('copied');
  document.getElementById('shareOverlay').classList.add('open');
}
function closeShareModal(e){if(!e||e.target===document.getElementById('shareOverlay'))document.getElementById('shareOverlay').classList.remove('open');}
function copyShareLink(){const url=buildShareUrl();navigator.clipboard.writeText(url).then(()=>{const btn=document.getElementById('shareLinkBtn');btn.textContent='✓ Copied!';btn.classList.add('copied');showToast('Link copied to clipboard');setTimeout(()=>{btn.textContent='Copy Link';btn.classList.remove('copied');},2500);}).catch(()=>{const ta=document.createElement('textarea');ta.value=url;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);showToast('Link copied!');});}
function copyShareText(){const txt=buildShareText();navigator.clipboard.writeText(txt).then(()=>{const btn=document.getElementById('shareTextBtn');btn.textContent='✓ Copied!';btn.classList.add('copied');showToast('List text copied');setTimeout(()=>{btn.textContent='Copy Text';btn.classList.remove('copied');},2500);}).catch(()=>{const ta=document.createElement('textarea');ta.value=txt;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);showToast('Copied!');});}

// ── Toast ─────────────────────────────────────────────────────────────────
let toastTimer;
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove('show'),2400);}

// ── Init ──────────────────────────────────────────────────────────────────
loadState();
render();
</script>
</body>
</html>
